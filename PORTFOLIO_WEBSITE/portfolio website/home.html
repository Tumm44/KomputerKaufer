<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Grid</title>
    <style>
        /* --- BASIC STYLES FOR CONTENT --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            font-size: 13px;
            line-height: 1.4;
            padding: 40px; /* Padding inside the iframe */
        }

        a {
            text-decoration: none;
            color: #000000;
        }

        /* --- PROJECT GRID --- */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 40px;
            max-width: 1600px;
        }

        .project-item {
            cursor: pointer;
        }

        .project-thumbnail {
            width: 100%;
            aspect-ratio: 4 / 3;
            background-color: #f0f0f0;
            object-fit: cover;
            margin-bottom: 10px;
            display: block;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .project-item:hover .project-thumbnail {
            transform: scale(1.02);
            opacity: 0.8;
        }

        .project-title {
            font-size: 13px;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            body { padding: 20px; }
            .project-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="project-grid">
